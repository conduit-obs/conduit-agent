# Release workflow (M12.E). Triggered by signed `vX.Y.Z` tags;
# produces signed artifacts for every supported platform via
# goreleaser, plus the cosign attestations the release runbook
# (docs/release/runbook.md) verifies.
#
# Status: scaffolded for M12. The signing infrastructure depends on
# OQ-5 (open question — which signing service backs the maintainer
# GPG + Authenticode setup), so the cosign / Authenticode steps are
# guarded by `if: env.SIGNING_READY == 'true'` until OQ-5 lands.
# That keeps the workflow runnable end-to-end on a release rehearsal
# (every step except signing succeeds) so the rest of the pipeline
# is exercised long before the first signed release.

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write   # cosign keyless OIDC

jobs:
  goreleaser:
    name: Goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Check out at the tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify the tag is signed
        # Maintainer-signed tags are part of the audit log. The
        # release runbook §4 documents the policy; this step is the
        # CI enforcement. Currently emits a warning rather than
        # failing — the hard enforcement comes back when OQ-5
        # (signing infrastructure ownership) lands, alongside the
        # cosign / Authenticode gates.
        run: |
          if ! git verify-tag "${GITHUB_REF_NAME}" 2>/dev/null; then
            echo "::warning::tag ${GITHUB_REF_NAME} is not GPG-signed; release runbook §4 will require signed tags once OQ-5 lands"
          fi

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Vendor OBI
        # ADR-0020 sub-decision 1: every Linux conduit binary links
        # OBI in. Goreleaser's Linux build paths reach
        # internal/collector/components_obi_linux.go, which imports
        # go.opentelemetry.io/obi/collector. Upstream proxy v0.8.0
        # ships no eBPF Go bindings (ADR-0020 "Open question: build
        # pipeline"), so we clone OBI source, run upstream's
        # `make docker-generate` here, and write a gitignored go.work
        # adding ./third_party/obi to the workspace. Goreleaser's
        # subsequent build step picks up the workspace and links the
        # generated bindings into the Linux artifacts. macOS / Windows
        # artifacts skip the OBI import via the //go:build tag and
        # are unaffected. Workspace mode (vs. `go mod edit -replace`)
        # is what lets the tagged tree stay clean — goreleaser's
        # dirty-state gate killed the v0.0.4 release before this fix.
        run: make obi-vendor

      - name: Pre-flight (test + vulncheck on the exact tagged commit)
        # Don't trust that the latest `main` CI run still applies —
        # the tag could be ahead of or behind it. Re-run the same
        # gates here so the release reflects the source it claims to.
        run: |
          go test ./...
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Set up cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.0

      - name: Set up syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: Set up qemu (cross-arch container builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run goreleaser
        # The actual artifact set + signing is configured in
        # .goreleaser.yaml. This step just orchestrates.
        # The .goreleaser.yaml uses `version: 2` schema, which
        # requires the goreleaser v2.x binary — v1.x errors with
        # "only configurations files on version: 1 are supported".
        # MSI is currently a non-deliverable: goreleaser v2 dropped
        # the top-level `msi:` builder, and the windows-msi job
        # below is `if: false` until OQ-5 (signing infrastructure
        # ownership) lands. When OQ-5 is resolved, the windows-msi
        # job comes back on and produces the MSI directly with WiX
        # on windows-latest.
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> 2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The snapshot path skips signing if the maintainer GPG
          # key isn't present in secrets — useful for release
          # rehearsals on a forked repo without real keys.
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}

  helm:
    name: Helm chart publish
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@v4
        with:
          version: v3.13.0
      - name: Set up cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.0
      - name: Log in to ghcr.io
        run: helm registry login ghcr.io -u "$GITHUB_ACTOR" --password-stdin <<< "${{ secrets.GITHUB_TOKEN }}"
      - name: Sync chart version with the tag
        # The chart version in deploy/helm/conduit-agent/Chart.yaml
        # tracks the release tag. CI fails the publish if they drift.
        run: |
          tag="${GITHUB_REF_NAME#v}"
          chart=$(awk '/^version:/ {print $2; exit}' deploy/helm/conduit-agent/Chart.yaml)
          if [ "$tag" != "$chart" ]; then
            echo "::error::tag $tag does not match chart version $chart"
            exit 1
          fi
      - name: Package + push + sign
        run: make helm-publish

  windows-msi:
    name: Windows MSI build (smoke)
    runs-on: windows-latest
    needs: goreleaser
    if: ${{ false }}   # Enabled when MSI signing infra (OQ-5) lands.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Build the conduit binary
        run: go build -o bin/conduit.exe ./
      - name: Build the MSI via WiX
        # WiX is preinstalled on windows-latest. Builds against
        # deploy/windows/wix/conduit.wxs and stages the binary +
        # default config under the WiX source tree.
        run: |
          $env:PATH += ";${env:WIX}\bin"
          candle deploy/windows/wix/conduit.wxs -out conduit.wixobj
          light conduit.wixobj -out conduit.msi
      - name: Smoke (install / verify service / uninstall)
        run: |
          msiexec.exe /i .\conduit.msi /qn /l*v install.log
          Start-Sleep -Seconds 5
          Get-Service conduit
          msiexec.exe /x .\conduit.msi /qn /l*v uninstall.log

  publish:
    # Promotes the goreleaser-produced draft to a published release once
    # both binaries (goreleaser) and the Helm chart (helm) have shipped
    # cleanly. Runbook §5 promises "everything is automated"; this is the
    # last piece — without it, install_linux.sh's `releases/latest`
    # resolver lags behind the tag and operators install stale debs from
    # the previous release (the v0.0.3 incident, 2026-05-04).
    #
    # Stable tags (vX.Y.Z) become the new "Latest". SemVer pre-release
    # tags (vX.Y.Z-rc.1, -beta, -alpha…) are un-drafted as prereleases
    # without bumping latest, mirroring goreleaser's `prerelease: auto`.
    name: Publish release
    runs-on: ubuntu-latest
    needs: [goreleaser, helm]
    permissions:
      contents: write
    steps:
      - name: Classify tag (stable vs prerelease)
        id: classify
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "kind=stable" >> "$GITHUB_OUTPUT"
          else
            echo "kind=prerelease" >> "$GITHUB_OUTPUT"
          fi
      - name: Promote draft → published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ "${{ steps.classify.outputs.kind }}" = "stable" ]; then
            gh release edit "${GITHUB_REF_NAME}" --draft=false --latest
            echo "::notice::release ${GITHUB_REF_NAME} promoted to Latest"
          else
            gh release edit "${GITHUB_REF_NAME}" --draft=false --prerelease
            echo "::notice::release ${GITHUB_REF_NAME} promoted to Prerelease"
          fi

  notify:
    name: Notify maintainers
    runs-on: ubuntu-latest
    needs: [goreleaser, helm, publish]
    if: always()
    steps:
      - name: Summarize the release status
        run: |
          gr="${{ needs.goreleaser.result }}"
          hl="${{ needs.helm.result }}"
          pb="${{ needs.publish.result }}"
          if [ "$gr" != "success" ] || [ "$hl" != "success" ] || [ "$pb" != "success" ]; then
            echo "::warning::release ${GITHUB_REF_NAME} did not complete cleanly (goreleaser=$gr helm=$hl publish=$pb); see the failed job(s). The release stays in Draft per runbook §5 until the failure is fixed and the workflow re-runs."
            exit 0
          fi
          echo "release ${GITHUB_REF_NAME} published — verify per docs/release/runbook.md §6"
