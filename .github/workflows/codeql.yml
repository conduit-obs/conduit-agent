name: CodeQL

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Vendor OBI
        # CodeQL's autobuild step compiles the Linux Go source — which
        # includes internal/collector/components_obi_linux.go and its
        # import of go.opentelemetry.io/obi/collector. The upstream
        # proxy v0.8.0 ships no eBPF Go bindings; we generate them
        # here so the autobuild succeeds. See ADR-0020 sub-decision 1
        # and "Open question: build pipeline".
        run: make obi-vendor
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
