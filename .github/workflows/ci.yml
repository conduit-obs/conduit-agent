name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Reusable composite step: clone the OBI source, generate its eBPF Go
  # bindings, and inject the `replace go.opentelemetry.io/obi =>
  # ./third_party/obi` directive into go.mod. Required by every Linux
  # job because internal/collector/components_obi_linux.go imports OBI
  # unconditionally on Linux (ADR-0020 sub-decision 1) and the upstream
  # proxy v0.8.0 doesn't ship the pre-generated BPF Go bindings (ADR-0020
  # "Open question: build pipeline"). Skipped on macOS / Windows runners
  # because the //go:build linux tag excludes the OBI import there.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Vendor OBI (Linux-only)
        run: make obi-vendor
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Vendor OBI (Linux-only)
        if: runner.os == 'Linux'
        # macOS / Windows runners skip OBI vendoring entirely. The
        # //go:build linux tag on components_obi_linux.go excludes
        # the import on those OSes; the upstream proxy v0.8.0
        # (which lacks BPF bindings) is sufficient to satisfy
        # `go mod download` since no Go file actually compiles
        # against the OBI module on macOS / Windows.
        run: make obi-vendor
      - name: go test
        run: go test ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Vendor OBI (Linux-only)
        run: make obi-vendor
      - name: make build
        run: make build
      - name: Smoke (binary boots, subcommands surface the right errors)
        run: |
          set +e
          # 'conduit run' with no --config falls back to /etc/conduit/conduit.yaml
          # which doesn't exist on CI runners; it must fail loud, not silent.
          ./bin/conduit run; rc=$?
          if [ $rc -eq 0 ]; then echo "expected non-zero exit when default config is missing"; exit 1; fi
          # 'conduit doctor' against a missing config should also fail (M11).
          ./bin/conduit doctor -c /nonexistent/conduit.yaml; rc=$?
          if [ $rc -eq 0 ]; then echo "expected non-zero exit from doctor against a missing config"; exit 1; fi
          ./bin/conduit --help

  goldens:
    name: Renderer goldens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Vendor OBI (Linux-only)
        run: make obi-vendor
      - name: Verify expander goldens are up to date
        # The harness diffs every testdata/goldens/<case>/expected.yaml
        # against a fresh render. Failure means a renderer change
        # landed without `make update-goldens`. Fix locally with
        # `make update-goldens` and commit the regenerated files.
        run: go test ./internal/expander -run TestExpand_Goldens -count=1

  doctor-anchors:
    name: Doctor docs anchors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Vendor OBI (Linux-only)
        run: make obi-vendor
      - name: Verify every CDT code has a docs section
        # Catches "added a check but forgot the troubleshooting doc"
        # before it ships. See docs/troubleshooting/cdt-codes.md.
        run: go test ./internal/doctor -run TestDocsAnchor -count=1

  vulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Vendor OBI (Linux-only)
        run: make obi-vendor
      - name: govulncheck
        # Per [07-testing-and-conformance-plan.md] §M12 release gates,
        # govulncheck is release-blocking on HIGH/CRITICAL findings.
        # The PR-level run surfaces every finding (HIGH and below) so
        # operators see the trend; release-blocking happens in
        # release.yml when the tag is cut.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
