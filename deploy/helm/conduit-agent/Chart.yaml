apiVersion: v2
name: conduit-agent
description: |-
  Conduit is an Apache-2.0 OpenTelemetry distribution for Honeycomb. This
  chart deploys the conduit agent as a Kubernetes DaemonSet (one pod per
  node) so cluster workloads can send OTLP to a local conduit:4317 / :4318
  endpoint and have it forwarded to Honeycomb.
type: application

# Chart SemVer. Bumped per chart change, not per agent release. The chart
# is not yet published; M5.D wires goreleaser to ship it to
# ghcr.io/conduit-obs/charts/conduit-agent (registry venue per ADR-0019).
version: 0.0.1

# Pinned upstream Conduit binary version this chart's defaults assume.
# The image tag in values.yaml may override; appVersion is what shows in
# `helm list` so operators can see "conduit-agent-0.0.1 / conduit 0.0.0-dev".
appVersion: "0.0.0-dev"

home: https://github.com/conduit-obs/conduit-agent
sources:
  - https://github.com/conduit-obs/conduit-agent

keywords:
  - opentelemetry
  - otel
  - honeycomb
  - observability
  - tracing
  - metrics
  - logs

maintainers:
  - name: Conduit Maintainers
    email: maintainers@conduit-obs.com
    url: https://github.com/conduit-obs/conduit-agent

# Kubernetes versions this chart is tested against. The DaemonSet shape
# in templates/daemonset.yaml uses apps/v1 + the standard pod spec, so
# anything supported by upstream Kubernetes works.
kubeVersion: ">=1.28.0-0"

annotations:
  # ArtifactHub annotations (used when M5.D lists the chart):
  # https://artifacthub.io/docs/topics/annotations/helm/
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/conduit-obs/conduit-agent
    - name: ADRs
      url: https://github.com/conduit-obs/conduit-agent/blob/main/docs/adr/README.md
