apiVersion: v2
name: conduit-agent
description: |-
  Conduit is an Apache-2.0, vendor-neutral OpenTelemetry Collector
  distribution. This chart deploys the conduit agent as a Kubernetes
  DaemonSet (one pod per node) so cluster workloads can send OTLP to a
  local conduit-agent:4317 / :4318 endpoint and have it forwarded to
  any OTLP-compatible backend — Honeycomb, Datadog, Grafana Cloud, an
  in-cluster gateway, etc. — via the configurable output mode.
type: application

# Chart SemVer. Bumped per chart change, not per agent release. Chart
# is published to oci://ghcr.io/conduit-obs/charts/conduit-agent (M5.D;
# registry venue per ADR-0019). The first published version will be
# v0.0.1 once the publishing recipe runs against a release tag.
version: 0.0.4

# Pinned upstream Conduit binary version this chart's defaults assume.
# The image tag in values.yaml may override; appVersion is what shows in
# `helm list` so operators can see "conduit-agent-0.0.1 / conduit 0.0.0-dev".
appVersion: "0.0.0-dev"

home: https://github.com/conduit-obs/conduit-agent
sources:
  - https://github.com/conduit-obs/conduit-agent

keywords:
  - opentelemetry
  - otel
  - otel-collector
  - observability
  - tracing
  - metrics
  - logs
  - honeycomb
  - datadog
  - grafana

maintainers:
  - name: Conduit Maintainers
    email: maintainers@conduit-obs.com
    url: https://github.com/conduit-obs/conduit-agent

# Kubernetes versions this chart is tested against. The DaemonSet shape
# in templates/daemonset.yaml uses apps/v1 + the standard pod spec, so
# anything supported by upstream Kubernetes works.
kubeVersion: ">=1.28.0-0"

annotations:
  # ArtifactHub annotations — picked up when ArtifactHub indexes the
  # OCI registry:
  # https://artifacthub.io/docs/topics/annotations/helm/
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/conduit-obs/conduit-agent
    - name: ADRs
      url: https://github.com/conduit-obs/conduit-agent/blob/main/docs/adr/README.md
    - name: Chart README
      url: https://github.com/conduit-obs/conduit-agent/blob/main/deploy/helm/conduit-agent/README.md
  artifacthub.io/category: monitoring-logging
  artifacthub.io/signKey: |
    fingerprint: cosign-keyless
    url: https://github.com/conduit-obs/conduit-agent/blob/main/deploy/helm/conduit-agent/README.md#verifying-the-signature
