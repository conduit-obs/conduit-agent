# Default values for conduit-agent.
#
# This file documents every knob the chart exposes. The chart deploys a
# DaemonSet running the Kubernetes profile end-to-end: per-node
# hostmetrics (via the host bind mount under daemonset.hostMounts),
# kubeletstats against the local kubelet (via the rbac.create
# ClusterRole), filelog/k8s tailing /var/log/pods/*, and the
# k8sattributes processor enriching every pipeline. OTLP is also accepted
# from peer pods at conduit-agent:4317 / :4318 and gets the same
# Kubernetes metadata enrichment.

# ---------------------------------------------------------------------------
# Honeycomb output. Required for the default values; switch to `gateway`
# below if you operate your own OTLP gateway.
# ---------------------------------------------------------------------------
honeycomb:
  # Set ONE of apiKey or existingSecret. If both are set, existingSecret wins.
  #
  # apiKey is a plain string baked into the rendered Secret. Convenient for
  # `helm install --set honeycomb.apiKey=$KEY` smoke tests, but operators
  # should ship the real key via existingSecret in any environment they care
  # about — Helm values are visible to anyone with read access to the
  # release secret.
  apiKey: ""

  # existingSecret names a pre-created Kubernetes Secret with the API key
  # under existingSecretKey. The DaemonSet mounts that key as the
  # HONEYCOMB_API_KEY env var which conduit.yaml expands via ${env:...}.
  #   kubectl create secret generic conduit-honeycomb \
  #     --from-literal=HONEYCOMB_API_KEY=hcaik_...
  existingSecret: ""
  existingSecretKey: HONEYCOMB_API_KEY

  # Honeycomb ingest endpoint. Override for EU tenants
  # (https://api.eu1.honeycomb.io) or sandboxes.
  endpoint: https://api.honeycomb.io

# Switch the egress to a customer-operated OTLP gateway instead of
# Honeycomb-direct. When enabled, honeycomb.apiKey / existingSecret are
# ignored. The gateway path mirrors output.mode=gateway in conduit.yaml
# (TLS-required by default per ADR-0009; insecure: true documented as a
# warning-level opt-out for lab use).
gateway:
  enabled: false
  endpoint: ""
  # headers map onto output.gateway.headers in conduit.yaml. Use this for
  # gateway-specific auth (e.g. an API key the gateway expects).
  headers: {}

# ---------------------------------------------------------------------------
# Conduit agent identity. These map onto the corresponding fields in
# conduit.yaml (validated by internal/config/types.go).
# ---------------------------------------------------------------------------
conduit:
  # Required. service.name resource attribute on every emitted signal.
  # Typical k8s value: a label or workload-style identifier like
  # "edge-cluster-prod" or "platform-shared".
  serviceName: ""

  # Required. deployment.environment resource attribute. e.g. "production",
  # "staging", "us-east-1".
  deploymentEnvironment: production

  # profile.mode in conduit.yaml. With profileMode=k8s (the default) the
  # chart's pod ships per-node hostmetrics + kubeletstats + filelog/k8s
  # and the k8sattributes processor on every pipeline. See
  # internal/profiles/k8s/README.md for the receiver shape.
  #
  # Operators who want an OTLP-only relay (no kubelet, no host metrics,
  # no container log tailing) should set profileMode=none AND
  # daemonset.hostMounts.enabled=false AND daemonset.runAsRoot=false AND
  # rbac.create=false to drop all the node-introspecting privileges this
  # chart grants by default.
  #
  # Valid values: auto | linux | darwin | docker | k8s | none.
  profileMode: k8s

# ---------------------------------------------------------------------------
# Image. Multi-arch manifest tags published by goreleaser per ADR-0019.
# ---------------------------------------------------------------------------
image:
  repository: ghcr.io/conduit-obs/conduit-agent
  # Override per release. Falls back to .Chart.AppVersion when empty so
  # `helm install` without --set image.tag tracks the chart version's
  # pinned agent build.
  tag: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

# ---------------------------------------------------------------------------
# DaemonSet shape.
# ---------------------------------------------------------------------------
daemonset:
  # Resources sized for the M5.B receiver set: hostmetrics +
  # kubeletstats + filelog/k8s + the k8sattributes processor. Numbers
  # are conservative starting points; tune from your cluster's
  # `kubectl top pod` once the agent is running. Bump if memory_limiter
  # starts dropping batches in the pod logs.
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 500m
      memory: 384Mi

  # Schedule on every Linux/amd64 / Linux/arm64 node by default. Override
  # nodeSelector to scope to a subset; tolerations are wide-open so the
  # agent runs on tainted system nodes (control plane, GPU pools) too —
  # comment them out if your security posture forbids that.
  nodeSelector:
    kubernetes.io/os: linux

  tolerations:
    - operator: Exists

  # Optional pod-level affinity / anti-affinity rules. Empty by default.
  affinity: {}

  # Annotations applied to every conduit pod. Useful for slotting the
  # agent into your existing scrape configs (e.g. `prometheus.io/scrape`).
  podAnnotations: {}

  # Labels applied to every conduit pod, in addition to the chart-managed
  # labels in templates/_helpers.tpl.
  podLabels: {}

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1

  # Set hostNetwork=true if you want the OTLP receiver reachable on the
  # node's IP directly (rather than only via the cluster network). Off by
  # default — peer pods use the conduit-agent service / pod IPs and get
  # there via the cluster network.
  hostNetwork: false
  dnsPolicy: ClusterFirstWithHostNet

  # Host bind mounts for the M5.B hostmetrics + filelog/k8s receivers.
  # When enabled, the DaemonSet:
  #   - mounts the host root at /hostfs (read-only, mountPropagation=HostToContainer)
  #   - mounts /var/log/pods and /var/log/containers (read-only)
  #   - sets HOST_PROC_MOUNTINFO=/hostfs/proc/self/mountinfo so the
  #     filesystem scraper sees the node's mount table
  #   - turns on hostPID so the processes scraper sees node-wide PIDs
  #
  # Disable for an OTLP-only k8s relay (also set conduit.profileMode=none
  # so hostmetrics doesn't scrape an empty /hostfs).
  hostMounts:
    enabled: true

  # Run as UID 0 / GID 0. Required by the default profile (mode=k8s)
  # because the kubelet's container log directories are mode 0700 owned
  # by root, and /proc/<pid> entries for non-root user pods are not
  # readable as a different unprivileged UID. Off-the-shelf Kubernetes
  # node introspection assumes root; the upstream
  # otel-collector-contrib helm chart's hostMetrics preset does the
  # same thing.
  #
  # When false, the container falls back to the image's baked-in
  # nonroot UID 65532 — fine for OTLP-only deployments
  # (profileMode=none / docker), broken with the default fragments.
  runAsRoot: true

# ---------------------------------------------------------------------------
# RBAC. The default M5.B fragment set (kubeletstats + k8sattributes)
# needs cluster-scoped read access to nodes/stats, pods, namespaces, and
# the apps + batch APIs that own pods. The ClusterRole granted here is
# read-only and free of Secret access; review templates/clusterrole.yaml
# to audit each rule against the receiver / processor that uses it.
#
# Disable rbac.create when your cluster manages RBAC out-of-band (e.g.
# an admission controller injects it). The serviceAccount.name you point
# at must already be bound to a ClusterRole with at least the same set.
# ---------------------------------------------------------------------------
rbac:
  create: true

serviceAccount:
  create: true
  # Override the auto-generated name when you need to bind external RBAC
  # to a known SA. Leave blank to use the default
  # `<release>-conduit-agent` naming.
  name: ""
  annotations: {}

# ---------------------------------------------------------------------------
# Service for OTLP ingress. Peer pods send to
# {{ include "conduit-agent.fullname" . }}:4317 / :4318. ClusterIP keeps
# the agent reachable inside the cluster without exposing it to the LAN.
# ---------------------------------------------------------------------------
service:
  enabled: true
  type: ClusterIP
  ports:
    grpc: 4317
    http: 4318
  # health_check is intentionally omitted from the Service: probes go
  # directly against the pod IP (the DaemonSet exposes 13133), and not
  # exposing it cluster-wide cuts attack surface.
  annotations: {}
