{{- /*
Honeycomb output requires exactly one source of HONEYCOMB_API_KEY: either
honeycomb.apiKey (chart-managed Secret) or honeycomb.existingSecret
(operator-managed Secret). Catch the unset case at install time rather
than letting pods CrashLoopBackOff with "secret not found".
*/ -}}
{{- if eq (include "conduit-agent.outputMode" .) "honeycomb" -}}
{{- if and (not .Values.honeycomb.apiKey) (not .Values.honeycomb.existingSecret) -}}
{{- fail "honeycomb.apiKey or honeycomb.existingSecret must be set when output mode is honeycomb (default). Set one via --set, switch to a generic OTLP/HTTP destination with --set otlp.enabled=true --set otlp.endpoint=..., or to an OTLP/gRPC gateway with --set gateway.enabled=true --set gateway.endpoint=..." -}}
{{- end -}}
{{- end -}}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "conduit-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "conduit-agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "conduit-agent.selectorLabels" . | nindent 6 }}
  updateStrategy:
    {{- toYaml .Values.daemonset.updateStrategy | nindent 4 }}
  template:
    metadata:
      labels:
        {{- include "conduit-agent.selectorLabels" . | nindent 8 }}
        {{- with .Values.daemonset.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Roll the DaemonSet whenever the rendered conduit.yaml changes.
        # Without this, ConfigMap edits would only take effect on pod
        # restarts triggered by something else.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if and (eq (include "conduit-agent.outputMode" .) "honeycomb") (not .Values.honeycomb.existingSecret) (.Values.honeycomb.apiKey) }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.daemonset.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "conduit-agent.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      hostNetwork: {{ .Values.daemonset.hostNetwork }}
      dnsPolicy: {{ .Values.daemonset.dnsPolicy }}
      {{- if .Values.daemonset.hostMounts.enabled }}
      # hostPID lets the processes scraper see every PID on the node
      # rather than just the conduit pod's PID namespace. Required when
      # hostmetrics is enabled and the processes scraper is on (it is in
      # the M5.B fragment); harmless when receivers are OTLP-only.
      hostPID: true
      {{- end }}
      {{- with .Values.daemonset.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.daemonset.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.daemonset.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: conduit
          image: {{ include "conduit-agent.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - run
            - --config
            - /etc/conduit/conduit.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: health
              containerPort: 13133
              protocol: TCP
          env:
            {{- if eq (include "conduit-agent.outputMode" .) "honeycomb" }}
            - name: HONEYCOMB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "conduit-agent.honeycombSecretName" . }}
                  key: {{ .Values.honeycomb.existingSecretKey }}
            {{- end }}
            # K8S_NODE_NAME / POD_NAME / POD_NAMESPACE come from the
            # downward API. K8S_NODE_NAME is consumed by kubeletstats
            # (endpoint: ${env:K8S_NODE_NAME}:10250) and the
            # k8sattributes processor (filter.node_from_env_var) so the
            # receiver and processor scope to the local node — without
            # this, k8sattributes watches every pod in the cluster from
            # every Conduit replica, scaling API server load with the
            # node count.
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.daemonset.hostMounts.enabled }}
            # The hostmetrics filesystem scraper reads /proc/self/mountinfo
            # to discover which filesystems exist on the node. With
            # root_path: /hostfs the receiver retargets most paths under
            # /hostfs automatically, but the *mountinfo* path is special-
            # cased to honor HOST_PROC_MOUNTINFO so the scraper sees the
            # node's mount table rather than the container's.
            - name: HOST_PROC_MOUNTINFO
              value: /hostfs/proc/self/mountinfo
            {{- end }}
            {{- /*
            extraEnv is the generic injection point for vendor auth tokens
            referenced from output.otlp.headers (e.g. DD_API_KEY for
            Datadog OTLP intake) or any other ${env:NAME} the user threads
            through overrides:. Each entry is rendered verbatim, so
            secretKeyRef / configMapKeyRef / fieldRef shapes all work.
            */ -}}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
          resources:
            {{- toYaml .Values.daemonset.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            {{- if .Values.daemonset.runAsRoot }}
            # The hostmetrics processes scraper reads /proc/<pid> for every
            # PID on the node and the filelog/k8s receiver reads
            # /var/log/pods/<ns>_<pod>_<uid>/<container>/*.log — both of
            # which the kubelet exposes with mode 0600 / 0700 owned by
            # root:root. Running as UID 0 is the standard k8s pattern for
            # node-introspecting agents (matches the upstream
            # otel-collector-contrib helm chart's hostMetrics preset).
            # Operators who run profile.mode=none or profile.mode=docker
            # should flip daemonset.runAsRoot=false for tighter pod
            # security; the chart-default nonroot UID 65532 is baked into
            # the image already.
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            {{- else }}
            runAsNonRoot: true
            {{- end }}
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/conduit
              readOnly: true
            {{- if .Values.daemonset.hostMounts.enabled }}
            # /hostfs gives hostmetrics the node's view of /proc, /sys, and
            # the host filesystems (re-rooted via root_path: /hostfs in
            # internal/profiles/k8s/hostmetrics.yaml). Read-only is
            # sufficient — scrapers never write — and
            # mountPropagation: HostToContainer keeps the view live as
            # the kubelet adds and removes mounts on the node.
            - name: hostfs
              mountPath: /hostfs
              readOnly: true
              mountPropagation: HostToContainer
            # /var/log/pods is the kubelet-managed location for container
            # logs since 1.14. Files inside resolve as symlinks into
            # /var/log/containers, so we mount both for the filelog
            # receiver to read through the symlinks.
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            - name: varlogcontainers
              mountPath: /var/log/containers
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "conduit-agent.fullname" . }}
            items:
              - key: conduit.yaml
                path: conduit.yaml
        {{- if .Values.daemonset.hostMounts.enabled }}
        - name: hostfs
          hostPath:
            path: /
            type: Directory
        - name: varlogpods
          hostPath:
            path: /var/log/pods
            type: DirectoryOrCreate
        - name: varlogcontainers
          hostPath:
            path: /var/log/containers
            type: DirectoryOrCreate
        {{- end }}
