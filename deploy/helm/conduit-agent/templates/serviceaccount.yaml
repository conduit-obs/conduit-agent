{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "conduit-agent.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "conduit-agent.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# The matching ClusterRole + ClusterRoleBinding live in
# templates/clusterrole.yaml and templates/clusterrolebinding.yaml,
# gated by .Values.rbac.create. Disable that flag when your cluster
# manages RBAC out-of-band and bind the same SA to an externally
# managed ClusterRole that grants at least the rules listed there.
{{- end -}}
