{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "conduit-agent.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "conduit-agent.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# M5.A's chart binds no ClusterRole — the default profile.mode=k8s ships
# no kubelet / k8sattributes / k8scluster receivers yet. M5.C wires up the
# RBAC once those receivers arrive in M5.B.
{{- end -}}
