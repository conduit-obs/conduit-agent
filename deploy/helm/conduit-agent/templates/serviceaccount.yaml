{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "conduit-agent.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "conduit-agent.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# The chart does not yet bind a ClusterRole — kubeletstats and
# k8sattributes (shipped by profile.mode=k8s in M5.B) will surface RBAC
# errors on startup until M5.C lands the matching cluster-scoped role
# and binding.
{{- end -}}
