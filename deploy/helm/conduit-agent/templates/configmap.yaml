apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "conduit-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "conduit-agent.labels" . | nindent 4 }}
data:
  # conduit.yaml shape mirrors deploy/docker/conduit.yaml.default. The
  # daemonset injects HONEYCOMB_API_KEY (when output.mode=honeycomb) via
  # secretKeyRef so the chart-managed conduit.yaml never has the literal
  # key embedded.
  conduit.yaml: |
    {{- if .Values.conduit.serviceName }}
    service_name: {{ .Values.conduit.serviceName | quote }}
    {{- else }}
    # service_name omitted: conduit's applyDefaults() supplies the
    # profile-shaped default ("k8s-cluster" for profile.mode=k8s) per
    # ADR-0021. Operators override by setting conduit.serviceName in
    # values.yaml.
    {{- end }}
    deployment_environment: {{ .Values.conduit.deploymentEnvironment | default "production" | quote }}

    output:
    {{- $mode := include "conduit-agent.outputMode" . }}
    {{- if eq $mode "honeycomb" }}
      mode: honeycomb
      honeycomb:
        api_key: ${env:HONEYCOMB_API_KEY}
        endpoint: {{ .Values.honeycomb.endpoint | default "https://api.honeycomb.io" | quote }}
    {{- else if eq $mode "otlp" }}
      mode: otlp
      otlp:
        endpoint: {{ required "otlp.endpoint is required when otlp.enabled=true" .Values.otlp.endpoint | quote }}
        {{- with .Values.otlp.headers }}
        headers:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- if .Values.otlp.compression }}
        compression: {{ .Values.otlp.compression | quote }}
        {{- end }}
        {{- if .Values.otlp.insecure }}
        insecure: true
        {{- end }}
    {{- else }}
      mode: gateway
      gateway:
        endpoint: {{ required "gateway.endpoint is required when gateway.enabled=true" .Values.gateway.endpoint | quote }}
        {{- with .Values.gateway.headers }}
        headers:
          {{- toYaml . | nindent 10 }}
        {{- end }}
    {{- end }}

    profile:
      # profile.mode=k8s ships per-node hostmetrics + kubeletstats +
      # filelog/k8s and turns on the k8sattributes processor on every
      # pipeline. See internal/profiles/k8s/README.md for the receivers
      # this enables; the matching ClusterRole, host bind mounts, and
      # runAsRoot security context live in templates/clusterrole.yaml
      # and templates/daemonset.yaml.
      mode: {{ .Values.conduit.profileMode | quote }}

    # OBI (OpenTelemetry eBPF Instrumentation) — see ADR-0020.
    #
    # Always emitted explicitly (never omitted) so the chart's
    # values.obi.enabled is the single source of truth: the
    # rendered conduit.yaml's obi.enabled and the daemonset's
    # securityContext.capabilities both come from the same input.
    # Without an explicit emission, the agent's per-profile default
    # (k8s -> true) would diverge from a chart that has
    # obi.enabled=false in values.yaml — quietly granting eBPF
    # caps without the operator asking for them.
    obi:
      enabled: {{ .Values.obi.enabled }}
      {{- if .Values.obi.replaceSpanMetricsConnector }}
      replace_span_metrics_connector: true
      {{- end }}
