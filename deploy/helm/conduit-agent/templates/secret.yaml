{{- /*
Render a Secret only when the operator chose the chart-managed apiKey
path (honeycomb.apiKey set, no honeycomb.existingSecret). When the
operator points at an existing Secret instead, we don't render anything
and the daemonset references their Secret directly via secretKeyRef.

When output.mode is gateway, we don't need the Honeycomb API key at all
so this template renders nothing.
*/ -}}
{{- if and (eq (include "conduit-agent.outputMode" .) "honeycomb") (not .Values.honeycomb.existingSecret) (.Values.honeycomb.apiKey) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "conduit-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "conduit-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.honeycomb.existingSecretKey }}: {{ .Values.honeycomb.apiKey | quote }}
{{- end -}}
