# Generated by conduit. Do not edit by hand; edit conduit.yaml or
# internal/expander/templates/base.yaml.tmpl instead.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  # Kubernetes default host-metrics profile.
  #
  # Splices in under receivers: in the rendered upstream OTel YAML and feeds
  # the metrics pipeline alongside otlp + kubeletstats. The shape mirrors the
  # Linux profile (same scrapers, same *.utilization opt-ins) because once
  # the chart bind-mounts the host root at /hostfs and re-roots the
  # scrapers via root_path, a DaemonSet pod's view of the node is identical
  # to a Linux host install's.
  #
  # root_path: /hostfs is the contract between this fragment and the chart.
  # Every scraper resolves /proc and /sys (and any path it walks for
  # filesystems) under root_path, so:
  #
  #   - cpu / memory / load / paging read /hostfs/proc/{stat,meminfo,...}
  #   - disk reads /hostfs/proc/diskstats
  #   - filesystem reads /hostfs/proc/{self/mountinfo,mounts}
  #   - processes reads /hostfs/proc/<pid>/
  #   - network reads /hostfs/proc/net/dev
  #
  # Without the matching `hostfs` host bind mount in the DaemonSet (provided
  # by the chart's daemonset.hostMounts.enabled = true) the scrapers report
  # the pod's view of /proc rather than the node's, which is rarely useful;
  # operators who want OTLP-only on k8s should set profile.mode=none.
  #
  # Together with kubeletstats (per-pod / per-container) and
  # filelog/k8s (container logs), this fragment covers the per-node
  # half of the four pillars; cluster-scope metrics (deployments,
  # replicasets, node conditions) live behind k8sclusterreceiver and
  # ship in a future single-replica Deployment, not this DaemonSet.
  hostmetrics:
    collection_interval: 60s
    root_path: /hostfs
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      load:
      disk:
      filesystem:
        metrics:
          system.filesystem.utilization:
            enabled: true
      network:
      paging:
        metrics:
          system.paging.utilization:
            enabled: true
      processes:
  # Kubernetes kubelet stats profile.
  #
  # Splices in under receivers: in the rendered upstream OTel YAML and feeds
  # the metrics pipeline. Scrapes the local node's kubelet on :10250 for
  # per-node, per-pod, and per-container CPU and memory.
  #
  # Why kubeletstats vs the cluster-wide cAdvisor metrics endpoint:
  #   - The DaemonSet runs one pod per node, so every kubelet is local —
  #     no cross-node API hops, lower latency, lower kubelet load.
  #   - Authentication uses the pod's ServiceAccount via Conduit's
  #     ClusterRole (granted in M5.C), matching the principle of "pods
  #     present what they are, not what they impersonate".
  #   - filter via K8S_NODE_NAME from the downward API (set by the chart's
  #     DaemonSet, see deploy/helm/conduit-agent/templates/daemonset.yaml)
  #     keeps the receiver scoped to the local node.
  #
  # insecure_skip_verify is on because most clusters give kubelets
  # self-signed serving certs that aren't reachable from the cluster's
  # trust bundle. Operators with a managed kubelet PKI should drop this
  # flag via overrides: in their conduit.yaml.
  #
  # The metrics: block enables a small set of upstream-disabled-by-default
  # metrics that the M5.E default board ("k8s-cluster-overview") needs to
  # answer the questions Datadog / Grafana operators reach for first:
  #
  #   container.uptime / k8s.pod.uptime     — only restart proxy we have
  #                                           short of shipping k8sclusterreceiver,
  #                                           which would emit k8s.container.restarts
  #                                           directly. A drop in container.uptime
  #                                           to ~0 means a container restarted.
  #
  #   k8s.pod.cpu_limit_utilization         — "is this pod hot relative to its
  #   k8s.pod.memory_limit_utilization        limit?" — what an SRE actually
  #                                           wants to know, vs. raw cores / bytes
  #                                           that depend on the workload's shape.
  #                                           Only emitted when the pod has limits
  #                                           set, so workloads without limits show
  #                                           up only in the absolute-cores panels.
  #
  # These are intentionally a small additive set — no cardinality blow-up
  # (same per-pod / per-container fan-out as the defaults), no node-relative
  # variants (left to operators who know they want them via overrides:).
  kubeletstats:
    collection_interval: 60s
    auth_type: serviceAccount
    endpoint: ${env:K8S_NODE_NAME}:10250
    insecure_skip_verify: true
    metric_groups:
      - node
      - pod
      - container
    metrics:
      container.uptime:
        enabled: true
      k8s.pod.uptime:
        enabled: true
      k8s.pod.cpu_limit_utilization:
        enabled: true
      k8s.pod.memory_limit_utilization:
        enabled: true
  # Kubernetes default container-logs profile.
  #
  # Splices in under receivers: in the rendered upstream OTel YAML and feeds
  # the logs pipeline alongside otlp. Tails every pod's container log on the
  # local node (/var/log/pods/<ns>_<pod>_<uid>/<container>/<n>.log — the path
  # layout kubelets have written since 1.14) and lets the upstream container
  # operator auto-detect the on-disk format (CRI / containerd / docker JSON)
  # so a single fragment works across every supported runtime.
  #
  # What add_metadata_from_filepath buys us: the operator parses the path
  # and sets k8s.namespace.name, k8s.pod.name, k8s.pod.uid, and
  # k8s.container.name as resource attributes on every emitted log record
  # — before k8sattributes runs at the processor stage to fill in the
  # higher-level workload metadata (deployment / replicaset / labels).
  #
  # The exclude list keeps Conduit from tailing its own log file (any pod
  # whose name starts with conduit-, in any namespace), which would create
  # a feedback loop where every emitted record produces another log line
  # in the next scrape. The Helm chart's release name is conventionally
  # conduit, giving pods named conduit-conduit-agent-<hash>; the wider
  # conduit-* glob also catches sibling helm releases (e.g.
  # conduit-platform-prod-conduit-agent-<hash>).
  #
  # start_at: end avoids replaying historical logs into Honeycomb on first
  # install. Operators who want a backfill on a particular node can mount
  # the chart-managed checkpoint volume (M9) onto a fresh pod with
  # start_at: beginning in their conduit.yaml override.
  filelog/k8s:
    include:
      - /var/log/pods/*/*/*.log
    exclude:
      - /var/log/pods/*_conduit-*/*/*.log
    start_at: end
    include_file_path: true
    include_file_name: false
    operators:
      - type: container
        add_metadata_from_filepath: true

  # OBI (OpenTelemetry eBPF Instrumentation) — zero-code application
  # instrumentation. Auto-discovers processes on the host / node and
  # emits HTTP / gRPC / database RED metrics + distributed traces
  # without any code changes in the instrumented services.
  #
  # Every signal OBI emits is scope-tagged instrumentation.scope =
  # "obi" so operators can filter at query time when both OBI and
  # the M8 span_metrics connector are running (the V0.1 default —
  # set obi.replace_span_metrics_connector: true to suppress the
  # connector entirely).
  #
  # The curated schema in conduit.yaml is intentionally minimal
  # (enabled + replace_span_metrics_connector). Tune anything else
  # — instrument targets, OBI feature flags, discovery poll
  # interval, k8s metadata extraction details — through
  # overrides.receivers.obi.<...>; the embedded collector
  # deep-merges overrides over the block emitted here. See
  # docs/adr/adr-0020.md.
  obi:
    meter_provider:
      # application: HTTP / gRPC / DB RED metrics + traces.
      # Network features (per-connection metrics) are off by
      # default because they're cardinality-explosive on busy
      # hosts; operators who want them add `network` via
      # overrides:.
      features: [application]
    # On the k8s profile, OBI auto-tags spans / metrics with the
    # workload's namespace, pod name, deployment, and node — the
    # same set k8sattributes layers on for OTLP traffic. Off on
    # every other profile because k8s API access is not
    # available there.
    attributes:
      kubernetes:
        enable: true

processors:
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25
  # resourcedetection populates host identity (host.name, host.id,
  # host.arch, os.type, os.description, ...) on every emitted signal so
  # multi-host deployments can break down telemetry by host. Always on;
  # not gated by profile since host identity is universal.
  #
  # Detector order matters: with override=false the first detector to set
  # a key wins. [env, system] means OTEL_RESOURCE_ATTRIBUTES (e.g.
  # host.name=node-foo from a Kubernetes downward-API env var) takes
  # precedence over the OS-detected hostname, while system fills in
  # everything env didn't supply. Both detectors leave incoming OTLP
  # resource attributes from upstream apps untouched.
  resourcedetection:
    detectors: [env, system]
    timeout: 2s
    override: false
  batch:
    send_batch_size: 8192
    timeout: 200ms
  resource:
    # service.name uses action: insert so the agent's profile-shaped default
    # (linux-host, macos-host, k8s-cluster, etc — see ADR-0021) labels signals
    # Conduit emits or discovers itself (host metrics, host logs, journald)
    # WITHOUT clobbering the service.name an upstream application sent on its
    # OTLP traffic. deployment.environment keeps action: upsert because env
    # tagging is a deployment concern that the operator deliberately wants to
    # win over whatever the application emitted.
    attributes:
      - key: service.name
        value: "${env:CONDUIT_SERVICE_NAME}"
        action: insert
      - key: deployment.environment
        value: "${env:CONDUIT_DEPLOYMENT_ENVIRONMENT}"
        action: upsert
  # k8sattributes enriches every signal with Kubernetes workload metadata
  # by associating the source pod (via IP, UID, or connection) and copying
  # configured fields onto resource attributes. Runs after resourcedetection
  # (so host identity is already on the record) and before resource (so the
  # user's explicit conduit.yaml service.name / deployment.environment can
  # still override what was discovered).
  #
  # filter.node_from_env_var scopes the watcher to pods on the local node
  # (K8S_NODE_NAME comes from the downward API; the Helm chart's DaemonSet
  # wires it into every Conduit pod). Without this scope every Conduit
  # replica would watch every pod in the cluster, dragging on the API
  # server proportional to fleet size.
  k8sattributes:
    auth_type: serviceAccount
    passthrough: false
    filter:
      node_from_env_var: K8S_NODE_NAME
    extract:
      metadata:
        - k8s.namespace.name
        - k8s.pod.name
        - k8s.pod.uid
        - k8s.pod.start_time
        - k8s.deployment.name
        - k8s.replicaset.name
        - k8s.daemonset.name
        - k8s.statefulset.name
        - k8s.job.name
        - k8s.cronjob.name
        - k8s.node.name
    pod_association:
      - sources:
          - from: resource_attribute
            name: k8s.pod.ip
      - sources:
          - from: resource_attribute
            name: k8s.pod.uid
      - sources:
          - from: connection
  # transform/logs does four things, in four independent statement
  # blocks (run in declaration order; each block's `where` predicate
  # filters records independently):
  #
  #   1. (M9.B) Masks well-known secret patterns in body and
  #      attributes["message"] BEFORE downstream processing copies them
  #      into normalized_message. Default-on per ADR-0006's spirit and
  #      [01-product-requirements.md] §FR-9 — even a Conduit operator who
  #      hasn't read the redaction docs should not accidentally ship
  #      plaintext credentials to Honeycomb / Datadog / Grafana Cloud.
  #      Patterns are intentionally narrow (high-confidence prefix +
  #      length + structure) to avoid false positives that would mask
  #      legitimate hex strings or base64 payloads. Operators who need
  #      stricter masking layer additional rules via overrides:
  #      (ADR-0012); operators who need looser masking are typically
  #      better off fixing their app's logging.
  #
  #   2. (M9.C) Parses JSON-bodied logs (Go zerolog, JS pino, Python
  #      structlog, anything emitting `{"level":"info","msg":"..."}`)
  #      and lifts the well-known fields onto OTel semantic locations:
  #      trace_id / span_id (under three common naming conventions —
  #      OTel-canonical, camelCase, logfmt-style), msg or message into
  #      attributes["message"] so the normalized_message block has
  #      data to work with, and severity (text + a five-level number
  #      mapping). Gated on `IsString(body) and ^\\s*\\{`; non-JSON
  #      bodies skip this block entirely. SDK-set trace ids and
  #      severities are preserved by `trace_id.string == ""` /
  #      `severity_number == UNSPECIFIED` guards.
  #
  #   3. Computes a normalized_message attribute alongside the (now
  #      redacted) message so Honeycomb can group similar log lines by
  #      template — masking the high-cardinality bits (PIDs, IDs, UUIDs,
  #      IPs, key=value values) that would otherwise make every line
  #      unique. body is intentionally left untouched here. Only runs
  #      when filelog's default parser populated attributes["message"]
  #      (BSD or ISO syslog lines); OTLP logs from upstream apps and
  #      journald entries pass through unmodified.
  #
  #   4. Defaults severity to INFO when no upstream stage set one.
  #      Filelog parses raw syslog lines and leaves severity_number=0
  #      (UNSPECIFIED), which makes Honeycomb severity filters drop
  #      those records. journald maps PRIORITY -> severity, and OTLP
  #      logs from apps already carry severity, so the
  #      where severity_number == SEVERITY_NUMBER_UNSPECIFIED guard
  #      keeps us from overwriting either.
  transform/logs:
    log_statements:
      - context: log
        conditions:
          - 'IsString(body) or attributes["message"] != nil'
        statements:
          # AWS access key IDs ("AKIA"+16 uppercase alphanumerics) are
          # the most distinctive credential pattern in cloud workloads
          # — the matching 40-char secret access key is too generic
          # for safe regex matching, so masking the access key id is
          # the practical signal that "an AWS credential leaked here".
          - 'replace_pattern(body, "AKIA[0-9A-Z]{16}", "AKIA****REDACTED****") where IsString(body)'
          - 'replace_pattern(attributes["message"], "AKIA[0-9A-Z]{16}", "AKIA****REDACTED****") where attributes["message"] != nil'
          # JSON Web Tokens — three base64url-encoded segments separated
          # by dots, prefixed with the standard "eyJ" header. Distinctive
          # enough to mask without false positives because the prefix
          # plus three-segment structure plus minimum lengths are very
          # unlikely to collide with non-JWT content.
          - 'replace_pattern(body, "eyJ[A-Za-z0-9_=-]{8,}\\.[A-Za-z0-9_=-]{4,}\\.[A-Za-z0-9_=.+/-]{4,}", "eyJ****REDACTED****") where IsString(body)'
          - 'replace_pattern(attributes["message"], "eyJ[A-Za-z0-9_=-]{8,}\\.[A-Za-z0-9_=-]{4,}\\.[A-Za-z0-9_=.+/-]{4,}", "eyJ****REDACTED****") where attributes["message"] != nil'
          # Common credential key=value patterns. Case-insensitive on the
          # key name, terminated by whitespace / comma / semicolon /
          # ampersand / quote so URL-style and form-style encodings both
          # mask cleanly. The value (everything after the =) is replaced
          # with "****REDACTED****"; the key is preserved so operators
          # can still see WHAT was redacted at query time.
          - 'replace_pattern(body, "(?i)(password|passwd|secret|token|apikey|api_key|access_key|aws_secret_access_key|authorization)=[^\\s,&;\"]+", "$1=****REDACTED****") where IsString(body)'
          - 'replace_pattern(attributes["message"], "(?i)(password|passwd|secret|token|apikey|api_key|access_key|aws_secret_access_key|authorization)=[^\\s,&;\"]+", "$1=****REDACTED****") where attributes["message"] != nil'
      - context: log
        # Single AND'd condition (not two list items) so OTTL
        # short-circuits — IsMatch is never invoked on a non-string
        # body. Journald (and any other receiver that emits structured
        # bodies as pcommon.Map) hit this path; calling IsMatch on a
        # Map errors in OTTL rather than returning false, and the
        # transform processor in contrib v0.151.0 can let a block
        # execute through that error. The per-statement `where
        # IsString(body)` guard below is the second line of defense.
        conditions:
          - 'IsString(body) and IsMatch(body, "^\\s*\\{")'
        statements:
          # Parse once into the per-record cache so subsequent
          # statements can index without re-parsing. ParseJSON errors
          # are non-fatal in OTTL — malformed JSON leaves cache["json"]
          # unset and every gated statement below skips via its
          # cache["json"] != nil short-circuit. The explicit
          # `where IsString(body)` here defends against the same
          # OTTL block-conditions edge case described above.
          - 'set(cache["json"], ParseJSON(body)) where IsString(body)'
          # Trace / span id lift: three naming conventions are common
          # in the wild (OTel-canonical trace_id, camelCase traceId,
          # logfmt-style trace.id). First match wins; gates on
          # trace_id.string == "" preserve any value an upstream OTLP
          # stage already set (so a correctly-correlating SDK isn't
          # overwritten by the agent).
          - 'set(trace_id.string, cache["json"]["trace_id"]) where cache["json"] != nil and IsString(cache["json"]["trace_id"]) and trace_id.string == ""'
          - 'set(trace_id.string, cache["json"]["traceId"]) where cache["json"] != nil and IsString(cache["json"]["traceId"]) and trace_id.string == ""'
          - 'set(trace_id.string, cache["json"]["trace.id"]) where cache["json"] != nil and IsString(cache["json"]["trace.id"]) and trace_id.string == ""'
          - 'set(span_id.string, cache["json"]["span_id"]) where cache["json"] != nil and IsString(cache["json"]["span_id"]) and span_id.string == ""'
          - 'set(span_id.string, cache["json"]["spanId"]) where cache["json"] != nil and IsString(cache["json"]["spanId"]) and span_id.string == ""'
          - 'set(span_id.string, cache["json"]["span.id"]) where cache["json"] != nil and IsString(cache["json"]["span.id"]) and span_id.string == ""'
          # Lift JSON's msg / message into attributes["message"] so the
          # normalized_message block (next) has data to work with for
          # JSON-bodied logs. attributes["message"] == nil guard keeps
          # any value an upstream stage already set.
          - 'set(attributes["message"], cache["json"]["msg"]) where cache["json"] != nil and IsString(cache["json"]["msg"]) and attributes["message"] == nil'
          - 'set(attributes["message"], cache["json"]["message"]) where cache["json"] != nil and IsString(cache["json"]["message"]) and attributes["message"] == nil'
          # Severity lift: text first, then a documented five-level
          # mapping for the number. Both gated on severity_number ==
          # UNSPECIFIED so SDK-set severities and journald PRIORITY
          # values pass through untouched.
          - 'set(severity_text, cache["json"]["level"]) where cache["json"] != nil and IsString(cache["json"]["level"]) and severity_number == SEVERITY_NUMBER_UNSPECIFIED'
          - 'set(severity_text, cache["json"]["severity"]) where cache["json"] != nil and IsString(cache["json"]["severity"]) and severity_number == SEVERITY_NUMBER_UNSPECIFIED'
          - 'set(severity_number, SEVERITY_NUMBER_TRACE) where severity_number == SEVERITY_NUMBER_UNSPECIFIED and IsMatch(severity_text, "(?i)^trace$")'
          - 'set(severity_number, SEVERITY_NUMBER_DEBUG) where severity_number == SEVERITY_NUMBER_UNSPECIFIED and IsMatch(severity_text, "(?i)^debug$")'
          - 'set(severity_number, SEVERITY_NUMBER_INFO) where severity_number == SEVERITY_NUMBER_UNSPECIFIED and IsMatch(severity_text, "(?i)^info(rmational)?$")'
          - 'set(severity_number, SEVERITY_NUMBER_WARN) where severity_number == SEVERITY_NUMBER_UNSPECIFIED and IsMatch(severity_text, "(?i)^warn(ing)?$")'
          - 'set(severity_number, SEVERITY_NUMBER_ERROR) where severity_number == SEVERITY_NUMBER_UNSPECIFIED and IsMatch(severity_text, "(?i)^(error|err|severe)$")'
          - 'set(severity_number, SEVERITY_NUMBER_FATAL) where severity_number == SEVERITY_NUMBER_UNSPECIFIED and IsMatch(severity_text, "(?i)^(fatal|critical|panic|emerg)$")'
      - context: log
        conditions:
          - 'attributes["message"] != nil'
        statements:
          - 'set(attributes["normalized_message"], attributes["message"])'
          - 'replace_pattern(attributes["normalized_message"], "[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}", "*")'
          - 'replace_pattern(attributes["normalized_message"], "\\b(?:\\d{1,3}\\.){3}\\d{1,3}\\b", "*.*.*.*")'
          - 'replace_pattern(attributes["normalized_message"], "(\\w+)=[^\\s,]+", "$1=*")'
          - 'replace_pattern(attributes["normalized_message"], "\\b\\d{4,}\\b", "*")'
      - context: log
        conditions:
          - 'severity_number == SEVERITY_NUMBER_UNSPECIFIED'
        statements:
          - 'set(severity_text, "INFO")'
          - 'set(severity_number, SEVERITY_NUMBER_INFO)'

exporters:
  otlphttp/honeycomb:
    endpoint: "https://api.honeycomb.io"
    headers:
      x-honeycomb-team: "${env:HONEYCOMB_API_KEY}"
    compression: gzip
  debug:
    verbosity: basic

# span_metrics tees the traces pipeline into a derived RED metrics
# stream (request count / error count / duration histogram) that lands
# on the metrics pipeline before any sampling step. The dimension list
# below is the documented Conduit default plus any user-supplied
# additions in metrics.red.span_dimensions /
# metrics.red.extra_resource_dimensions; ADR-0006 documents the
# allowlist + denylist model and conduit doctor (M11) surfaces
# CDT0501 / CDT0510 when those guardrails fire.
#
# aggregation_cardinality_limit caps total tracked dimension
# combinations; excess flows to a single overflow series tagged
# otel.metric.overflow="true" so cardinality-blowup is visible at
# query time instead of crashing the agent.
connectors:
  span_metrics:
    histogram:
      explicit:
        buckets: [10ms, 50ms, 100ms, 250ms, 500ms, 1s, 2.5s, 5s, 10s]
    dimensions:
      - name: deployment.environment
      - name: http.route
      - name: http.method
      - name: http.status_code
      - name: rpc.system
      - name: rpc.service
      - name: rpc.method
      - name: messaging.system
      - name: messaging.operation
    resource_metrics_key_attributes:
      - service.name
      - deployment.environment
      - k8s.namespace.name
      - cloud.region
      - team
    add_resource_attributes: true
    aggregation_cardinality_limit: 5000
    metrics_flush_interval: 60s

# health_check is always on so Docker HEALTHCHECK, k8s liveness/readiness
# probes, and `conduit doctor` (M11) all have a single, vendor-neutral
# endpoint to hit. Bound to 0.0.0.0 on every profile because the endpoint
# only reports collector liveness — there is no telemetry payload to
# protect, and host-mode operators can still reach it via 127.0.0.1.
#
# file_storage (M10.A) is rendered only when output.persistent_queue
# is enabled. It backs every active exporter's sending_queue with disk
# so OTLP batches survive restarts and crashes; on_start compaction
# reclaims tombstoned space from previous runs.
extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers:
        - otlp
        - obi
      processors: [memory_limiter, resourcedetection, k8sattributes, resource, batch]
      exporters: [otlphttp/honeycomb, debug, span_metrics]
    metrics:
      receivers:
        - otlp
        - hostmetrics
        - kubeletstats
        - obi
        - span_metrics
      processors: [memory_limiter, resourcedetection, k8sattributes, resource, batch]
      exporters: [otlphttp/honeycomb, debug]
    logs:
      receivers:
        - otlp
        - filelog/k8s
      processors: [memory_limiter, resourcedetection, k8sattributes, resource, transform/logs, batch]
      exporters: [otlphttp/honeycomb, debug]
