# macOS default host-metrics profile.
#
# Splices in under receivers: in the rendered upstream OTel YAML and feeds
# the metrics pipeline alongside otlp. The scraper set is the macOS-safe
# subset of the Linux list:
#
#   - cpu, memory, load, disk, filesystem, network: all work on darwin.
#   - paging and processes are intentionally omitted. Both can require
#     elevated privileges or rely on procfs primitives macOS doesn't expose,
#     and silently underreport when run unprivileged. Users who specifically
#     want them can re-enable via their own conduit.yaml after profile is
#     set to "none".
#
# 60s collection interval matches the Linux profile so dashboards behave
# consistently across platforms.
#
# Each scraper's *.utilization metric is disabled upstream by default but
# enabled here. They're computed alongside the byte-level metrics (no extra
# scrape cost) and give dashboards the percent form ("67% used") that
# normalizes across hosts of different sizes — without them you only get
# the raw "110290665472 bytes" value.
hostmetrics:
  collection_interval: 60s
  scrapers:
    cpu:
      metrics:
        system.cpu.utilization:
          enabled: true
    memory:
      metrics:
        system.memory.utilization:
          enabled: true
    load:
    disk:
    filesystem:
      metrics:
        system.filesystem.utilization:
          enabled: true
    network:
