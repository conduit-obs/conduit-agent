# Kubernetes default host-metrics profile.
#
# Splices in under receivers: in the rendered upstream OTel YAML and feeds
# the metrics pipeline alongside otlp + kubeletstats. The shape mirrors the
# Linux profile (same scrapers, same *.utilization opt-ins) because once
# the chart bind-mounts the host root at /hostfs and re-roots the
# scrapers via root_path, a DaemonSet pod's view of the node is identical
# to a Linux host install's.
#
# root_path: /hostfs is the contract between this fragment and the chart.
# Every scraper resolves /proc and /sys (and any path it walks for
# filesystems) under root_path, so:
#
#   - cpu / memory / load / paging read /hostfs/proc/{stat,meminfo,...}
#   - disk reads /hostfs/proc/diskstats
#   - filesystem reads /hostfs/proc/{self/mountinfo,mounts}
#   - processes reads /hostfs/proc/<pid>/
#   - network reads /hostfs/proc/net/dev
#
# Without the matching `hostfs` host bind mount in the DaemonSet (provided
# by the chart's daemonset.hostMounts.enabled = true) the scrapers report
# the pod's view of /proc rather than the node's, which is rarely useful;
# operators who want OTLP-only on k8s should set profile.mode=none.
#
# Together with kubeletstats (per-pod / per-container) and
# filelog/k8s (container logs), this fragment covers the per-node
# half of the four pillars; cluster-scope metrics (deployments,
# replicasets, node conditions) live behind k8sclusterreceiver and
# ship in a future single-replica Deployment, not this DaemonSet.
hostmetrics:
  collection_interval: 60s
  root_path: /hostfs
  scrapers:
    cpu:
      metrics:
        system.cpu.utilization:
          enabled: true
    memory:
      metrics:
        system.memory.utilization:
          enabled: true
    load:
    disk:
    filesystem:
      metrics:
        system.filesystem.utilization:
          enabled: true
    network:
    paging:
      metrics:
        system.paging.utilization:
          enabled: true
    processes:
