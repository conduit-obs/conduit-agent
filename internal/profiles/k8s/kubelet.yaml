# Kubernetes kubelet stats profile.
#
# Splices in under receivers: in the rendered upstream OTel YAML and feeds
# the metrics pipeline. Scrapes the local node's kubelet on :10250 for
# per-node, per-pod, and per-container CPU and memory.
#
# Why kubeletstats vs the cluster-wide cAdvisor metrics endpoint:
#   - The DaemonSet runs one pod per node, so every kubelet is local —
#     no cross-node API hops, lower latency, lower kubelet load.
#   - Authentication uses the pod's ServiceAccount via Conduit's
#     ClusterRole (granted in M5.C), matching the principle of "pods
#     present what they are, not what they impersonate".
#   - filter via K8S_NODE_NAME from the downward API (set by the chart's
#     DaemonSet, see deploy/helm/conduit-agent/templates/daemonset.yaml)
#     keeps the receiver scoped to the local node.
#
# insecure_skip_verify is on because most clusters give kubelets
# self-signed serving certs that aren't reachable from the cluster's
# trust bundle. Operators with a managed kubelet PKI should drop this
# flag via overrides: in their conduit.yaml.
#
# The metrics: block enables a small set of upstream-disabled-by-default
# metrics that the M5.E default board ("k8s-cluster-overview") needs to
# answer the questions Datadog / Grafana operators reach for first:
#
#   container.uptime / k8s.pod.uptime     — only restart proxy we have
#                                           short of shipping k8sclusterreceiver,
#                                           which would emit k8s.container.restarts
#                                           directly. A drop in container.uptime
#                                           to ~0 means a container restarted.
#
#   k8s.pod.cpu_limit_utilization         — "is this pod hot relative to its
#   k8s.pod.memory_limit_utilization        limit?" — what an SRE actually
#                                           wants to know, vs. raw cores / bytes
#                                           that depend on the workload's shape.
#                                           Only emitted when the pod has limits
#                                           set, so workloads without limits show
#                                           up only in the absolute-cores panels.
#
# These are intentionally a small additive set — no cardinality blow-up
# (same per-pod / per-container fan-out as the defaults), no node-relative
# variants (left to operators who know they want them via overrides:).
kubeletstats:
  collection_interval: 60s
  auth_type: serviceAccount
  endpoint: ${env:K8S_NODE_NAME}:10250
  insecure_skip_verify: true
  metric_groups:
    - node
    - pod
    - container
  metrics:
    container.uptime:
      enabled: true
    k8s.pod.uptime:
      enabled: true
    k8s.pod.cpu_limit_utilization:
      enabled: true
    k8s.pod.memory_limit_utilization:
      enabled: true
